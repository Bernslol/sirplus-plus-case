    const b64ToBytes = (b64) => Uint8Array.from(atob(b64), c => c.charCodeAt(0));
    async function decrypt(password) {
      const material = await crypto.subtle.importKey('raw', new TextEncoder().encode(password), 'PBKDF2', false, ['deriveKey']);
      const key = await crypto.subtle.deriveKey(
        { name: 'PBKDF2', salt: b64ToBytes(payload.salt), iterations: 250000, hash: 'SHA-256' },
        material,
        { name: 'AES-GCM', length: 256 },
        false,
        ['decrypt']
      );
      const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: b64ToBytes(payload.iv) }, key, b64ToBytes(payload.data));
      return new TextDecoder().decode(plain);
    }
    document.getElementById('gate').addEventListener('submit', async (event) => {
      event.preventDefault();
      const error = document.getElementById('error');
      const button = event.target.querySelector('button');
      error.textContent = '';
      button.disabled = true;
      button.textContent = 'Opening...';
      try {
        const html = await decrypt(document.getElementById('password').value);
        document.open();
        document.write(html);
        document.close();
      } catch (e) {
        error.textContent = 'Incorrect password.';
        button.disabled = false;
        button.textContent = 'Open business case';
      }
    });
  </script>
